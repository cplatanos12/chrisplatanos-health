<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Platanos - Health & Wellness Coach</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #f5f5f0 0%, #e8e8e0 100%);
            color: #2c3e50;
            line-height: 1.6;
        }
        
        header {
            background: linear-gradient(135deg, #1a3a3a 0%, #2d5a5a 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }
        
        .hero-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        
        .hero-photo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .hero-text h1 {
            font-size: 48px;
            margin-bottom: 10px;
            font-weight: normal;
            letter-spacing: 1px;
        }
        
        .hero-text p {
            font-size: 20px;
            opacity: 0.9;
            font-style: italic;
            margin-bottom: 20px;
        }
        
        .credentials {
            background: #2d5a5a;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        
        .credential-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        
        .credential-badge {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        section {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 20px;
        }
        
        h2 {
            font-size: 36px;
            margin-bottom: 40px;
            text-align: center;
            color: #1a3a3a;
            font-weight: normal;
            letter-spacing: 0.5px;
        }
        
        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }
        
        .about-text p {
            font-size: 16px;
            margin-bottom: 20px;
            color: #555;
            line-height: 1.8;
        }
        
        .workshop-card {
            background: #2d5a5a;
            color: white;
            padding: 30px;
            border-radius: 8px;
            margin-top: 30px;
        }
        
        .workshop-card h3 {
            font-size: 22px;
            margin-bottom: 15px;
            font-weight: normal;
        }
        
        .workshop-card p {
            font-size: 15px;
            line-height: 1.7;
        }
        
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }
        
        .article-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }
        
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .article-header {
            background: linear-gradient(135deg, #1a3a3a 0%, #2d5a5a 100%);
            color: white;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .article-card h3 {
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: normal;
            line-height: 1.5;
        }
        
        .article-card p {
            font-size: 13px;
            opacity: 0.9;
        }
        
        .article-link {
            background: white;
            padding: 15px 20px;
            text-align: center;
        }
        
        .article-link a {
            color: #1a3a3a;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .article-link a:hover {
            color: #2d5a5a;
        }
        
        .contact-section {
            background: #f0f5f5;
            padding: 60px 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .contact-info {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        
        .contact-item {
            font-size: 16px;
        }
        
        .contact-item a {
            color: #1a3a3a;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        
        .contact-item a:hover {
            color: #2d5a5a;
        }
        
        footer {
            background: #1a3a3a;
            color: white;
            text-align: center;
            padding: 40px 20px;
            margin-top: 80px;
        }

            color: #a8d5d5;
            text-decoration: none;
            transition: color 0.3s;
        }
